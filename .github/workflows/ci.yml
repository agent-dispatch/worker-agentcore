name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Bootstrap check
        run: |
          if grep -q "file:../" package.json; then
            echo "Skipping npm install until cross-repo packages are published."
            exit 0
          fi
          npm install
          npm run typecheck
          npm test --if-present
          npm run build
